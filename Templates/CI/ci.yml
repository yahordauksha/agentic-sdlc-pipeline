name: ci

on:
  pull_request:
  push:
    branches: [main]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # [CUSTOMIZE] set up this project's actual runtime - example shown for Node, swap for whatever this project uses
      - name: Set up runtime
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      # [CUSTOMIZE] this project's actual install command
      - name: Install dependencies
        run: npm ci

      # [CUSTOMIZE] this project's actual architecture-boundary check, if it has one - delete this step if not.
      # Must match what Templates/Skills/implement.md STEP 7c runs locally before opening a PR.
      - name: Architecture-boundary check
        run: npm run check:boundaries

      # [CUSTOMIZE] this project's actual linter - must match Templates/Skills/implement.md STEP 7c
      - name: Lint
        run: npm run lint

      # [CUSTOMIZE] this project's actual test command - must match Templates/Skills/implement.md STEP 7c
      - name: Test
        run: npm test
